apiversion:  apps/v1
kind:  ReplicaSet
metadata:
  name:  rs
  labels:
    app:  rs
  spec:
       replica: 3
       template:
            metadata:
            name: nginx-pod
            labels:
                     app: rcapp   
    spec: 
    container: 
          -image: nginx:latest
          ports:
                containerPort:  80
                name: nginxco

selector:
matchLabels :
          app:  rcapp

        


