apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: nginx-pod

spec:
    template:
        metadata:
        label: 
            name: cw-pod
          containers:
                - name: nginx
                  image: amazon/cloudwatch-agent
                 ports:
                      containerPort: 80
                      name :cloudwatch-container
  selector:
        matchlabels:
              app: cw-pod
